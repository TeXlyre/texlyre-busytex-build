name: bench-wasm

on:
  workflow_dispatch:
    inputs:
      busytexwasmreleasetag:
        description: 'busytex wasm release tag'
        required: true
      busytexnativereleasetag:
        description: 'busytex native release tag (for building texlive-full)'
        required: true

env:
  BENCHSETURLS: >-
    https://github.com/busytex/busytex/releases/download/busytexbenchset/arXiv_src_1702_001.tar
    https://github.com/busytex/busytex/releases/download/busytexbenchset/arXiv_src_2202_001.tar
    https://github.com/busytex/busytex/releases/download/busytexbenchset/arXiv_src_2302_001.tar
    https://github.com/busytex/busytex/releases/download/busytexbenchset/arXiv_src_2402_001.tar
  BENCHSETTARS: arXiv_src_1702_001.tar arXiv_src_2202_001.tar arXiv_src_2302_001.tar arXiv_src_2402_001.tar

jobs:
  bench-wasm:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Python dependencies
        run: pip install flask flask-cors redis gevent --break-system-packages

      - name: Download WASM assets
        run: |
          BASE=$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/releases/download/${{ github.event.inputs.busytexwasmreleasetag }}
          mkdir -p dist-wasm
          for f in busytex.js busytex.wasm texlive-basic.js texlive-basic.data; do
            wget -P dist-wasm "$BASE/$f"
          done

      - name: Download native binaries
        run: make URLRELEASE=$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/releases/download/${{ github.event.inputs.busytexnativereleasetag }} download-native

      - name: Build TeX Live full tree
        run: |
          make source/texmfrepo.txt
          make build/texlive-full.txt

      - name: Start TeX Live server
        run: |
          TEXMF_ROOT=$PWD/build/texlive-full/texmf-dist \
          PORT=8070 \
          python3 texlive-server/wsgi.py &
          echo $! > /tmp/texlive_server.pid
          sleep 3
          curl -sf http://localhost:8070/26/article.cls | head -c 20 || (echo "Server failed to start"; exit 1)

      - name: Test WASM build
        run: bash scripts/test_wasm.sh dist-wasm/busytex.js dist-wasm/texlive-basic.js

      - name: Download benchset
        run: wget ${{ env.BENCHSETURLS }}

      - name: Bench WASM
        run: |
          TEXLIVE_REMOTE_ENDPOINT=http://localhost:8070 \
          bash scripts/bench_wasm.sh dist-wasm/busytex.js dist-wasm/texlive-basic.js ${{ env.BENCHSETTARS }} \
            | tee bench_wasm_results.log

      - name: Stop TeX Live server
        if: always()
        run: kill $(cat /tmp/texlive_server.pid) 2>/dev/null || true

      - name: Upload bench results
        uses: actions/upload-artifact@v4
        with:
          name: bench-wasm-results
          path: bench_wasm_results.log